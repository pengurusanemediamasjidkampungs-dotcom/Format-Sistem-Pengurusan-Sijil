<!DOCTYPE html>
<html lang="ms" class="bg-[#050505]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pengurusan Sijil v2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex flex-col items-center justify-center min-h-screen font-['Inter'] text-white/90 p-6">

    <div x-data="systemStatus" 
         @click="toggleActive"
         :class="active ? 'border-sky-500/50 shadow-sky-500/20' : 'border-white/10'"
         class="main-card group">
        
        <div class="blur-glow group-hover:bg-sky-500/20"></div>

        <div class="relative z-10 space-y-6">
            <div class="flex justify-between items-start">
                <div class="icon-box shadow-lg" :class="pulse && 'animate-ping'">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                </div>
                <span class="version-tag">System v2.1</span>
            </div>

            <div>
                <h2 class="text-2xl font-light tracking-tight">Status 
                    <span class="font-semibold text-sky-400" x-text="active ? 'Aktif' : 'Standby'"></span>
                </h2>
                <p class="text-sm text-white/40 mt-1 leading-relaxed">
                    Sistem pengurusan data automatik dengan enkripsi hujung-ke-hujung.
                </p>
            </div>

            <div class="pt-4 flex items-center gap-3">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" :style="active ? 'width: 100%' : 'width: 30%'"></div>
                </div>
                <span class="status-label" x-text="active ? 'SYNCED' : 'IDLE'"></span>
            </div>
        </div>

        <div class="overlay-gradient group-hover:opacity-100"></div>
    </div>

    <div id="control-panel-container" class="w-full max-w-4xl mt-10"></div>
    <div id="preview-area" class="w-full mt-6"></div>

    <script src="template.js"></script>
    <script src="script.js"></script>
</body>
</html>
