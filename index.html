<!DOCTYPE html>
<html lang="ms" class="bg-[#050505] scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pengurusan Sijil v2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="font-['Inter'] text-white/90 min-h-screen p-4 lg:p-8">
    <header class="max-w-7xl mx-auto mb-10 flex justify-center">
        <div x-data="systemStatus" @click="toggleActive" :class="active ? 'border-sky-500/50 shadow-sky-500/20' : 'border-white/10'" class="main-card group">
            <div class="blur-glow group-hover:bg-sky-500/20"></div>
            <div class="relative z-10 space-y-6">
                <div class="flex justify-between items-start">
                    <div class="icon-box shadow-lg" :class="pulse && 'animate-ping'"><svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></div>
                    <span class="version-tag">System v2.1</span>
                </div>
                <div>
                    <h2 class="text-2xl font-light tracking-tight">Status <span class="font-semibold text-sky-400" x-text="active ? 'Aktif' : 'Standby'"></span></h2>
                    <p id="status-text" class="text-sm text-white/40 mt-1 leading-relaxed">Sistem pengurusan data automatik dengan enkripsi hujung-ke-hujung.</p>
                </div>
                <div class="pt-4 flex items-center gap-3">
                    <div class="progress-bar-bg"><div class="progress-bar-fill" :style="active ? 'width: 100%' : 'width: 30%'"></div></div>
                    <span class="status-label" x-text="active ? 'SYNCED' : 'IDLE'"></span>
                </div>
            </div>
            <div class="overlay-gradient group-hover:opacity-100"></div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        <aside class="lg:col-span-4 space-y-6 no-print">
            <div class="glass-panel p-6 space-y-4">
                <h3 class="text-xs font-semibold text-sky-400 uppercase tracking-widest">Kawalan & Tapisan</h3>
                <select id="group-filter" onchange="filterData()" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-sky-500"><option value="ALL">Semua Kumpulan</option><option value="PEMBIMBING">Pembimbing</option></select>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="toggleAll(true)" class="btn-secondary">Pilih Semua</button>
                    <button onclick="toggleAll(false)" class="btn-secondary">Nyahpilih</button>
                </div>
                <button onclick="hantarSemuaPilihan()" class="w-full py-4 bg-gradient-to-r from-sky-500 to-blue-600 rounded-2xl font-bold text-sm shadow-lg shadow-sky-500/20 hover:scale-[1.02] transition-transform">🚀 AUTO-RUN TELEGRAM</button>
            </div>
            <div class="glass-panel p-2 max-h-[500px] overflow-y-auto custom-scrollbar"><div id="name-list" class="space-y-1"></div></div>
        </aside>

        <section class="lg:col-span-8 flex flex-col items-center">
            <div id="preview-area" class="w-full min-h-[400px] flex flex-col items-center">
                <div class="text-center py-20 opacity-20 border-2 border-dashed border-white/10 rounded-[3rem] w-full"><p>Sila pilih nama peserta untuk pralihat sijil</p></div>
            </div>
        </section>
    </main>

    <div id="preview-modal" class="fixed inset-0 z-50 bg-black/95 backdrop-blur-md hidden overflow-y-auto p-4"><div id="modal-content" class="relative"></div></div>
    <script src="template.js"></script><script src="script.js"></script>
</body>
</html>
